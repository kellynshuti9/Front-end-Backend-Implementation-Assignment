# Use AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Gradle Daemon for faster builds
org.gradle.daemon=true

# Enable parallel project execution
org.gradle.parallel=true

# Configure on-demand for faster configuration
org.gradle.configureondemand=true

# JVM arguments for Gradle — increase memory to speed up large builds
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Kotlin incremental compilation
kotlin.incremental=true

# Enable offline mode if all dependencies are already downloaded
# org.gradle.offline=true